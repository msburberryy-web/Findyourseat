name: "Deploy to GitHub Pages"

# build & publish on every push to main
on:
  push:
    branches:
      - main

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    # opt into Node.js 24 for JavaScript actions to silence deprecation warnings
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4
        with:
          # gh-pages action will push to gh-pages branch, so
          # avoid the default token being deleted by checkout
          persist-credentials: false

      - name: "Set up Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: "Install dependencies"
        run: npm ci

      - name: "Configure git identity"
        run: |
          # gh-pages will create commits; make sure git has a valid user/email
          # set both global (for any git invocation) and local config (safer inside repo)
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git config --list   # debug: show what we configured

      - name: "Build & deploy"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run predeploy
          npm run deploy
